<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bg)"/>

  <!-- ── HEADER BAR ── -->
  <rect x="0" y="0" width="1000" height="86" fill="#451a03"/>
  <line x1="0" y1="86" x2="1000" y2="86" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

  <!-- WARN badge -->
  <rect x="18" y="18" width="72" height="32" rx="6" fill="#f59e0b"/>
  <text x="54" y="40" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">WARN</text>
  <text x="102" y="36" text-anchor="start" fill="#fbbf24" font-size="13" font-weight="600">3 issues found</text>

  <!-- Center title -->
  <text x="500" y="34" text-anchor="middle" fill="#f1f5f9" font-size="19" font-weight="700">GoldenSetAudit — eval_dataset_v2.jsonl</text>
  <text x="500" y="56" text-anchor="middle" fill="#94a3b8" font-size="11">127 examples · 5 categories · Audit-ID: GSA-2024-001 · 48ms</text>

  <!-- Right badges -->
  <rect x="840" y="20" width="100" height="22" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="890" y="36" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">7/7 checks run</text>
  <rect x="840" y="48" width="140" height="22" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="910" y="64" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">no LLM dependency</text>

  <!-- ── CARD 1: DUPLICATE DETECTION ── -->
  <rect x="12" y="100" width="312" height="242" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="12" y="100" width="312" height="36" rx="8" fill="#451a03"/>
  <rect x="12" y="120" width="312" height="16" fill="#451a03"/>
  <text x="28" y="124" text-anchor="start" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="1.5">DUPLICATE DETECTION</text>
  <rect x="248" y="107" width="64" height="22" rx="4" fill="#f59e0b"/>
  <text x="280" y="123" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="700">WARN</text>

  <text x="28" y="160" text-anchor="start" fill="#fbbf24" font-size="13" font-weight="600">3 near-duplicates found</text>

  <text x="28" y="183" text-anchor="start" fill="#94a3b8" font-size="10">Examples:</text>
  <text x="28" y="200" text-anchor="start" fill="#fbbf24" font-size="11">Q47 ≈ Q112   (similarity 0.94)</text>
  <text x="28" y="218" text-anchor="start" fill="#fbbf24" font-size="11">Q83 ≈ Q91   (similarity 0.91)</text>

  <line x1="28" y1="232" x2="308" y2="232" stroke="#475569" stroke-width="0.5"/>
  <text x="28" y="250" text-anchor="start" fill="#64748b" font-size="10">Exact duplicates: 0</text>
  <text x="28" y="265" text-anchor="start" fill="#64748b" font-size="10">Near-dup threshold: 0.85</text>
  <rect x="16" y="316" width="304" height="22" rx="4" fill="#451a03" opacity="0.7"/>
  <text x="168" y="332" text-anchor="middle" fill="#fbbf24" font-size="10">Recommend: review and deduplicate before eval</text>

  <!-- ── CARD 2: ANSWER QUALITY ── -->
  <rect x="340" y="100" width="312" height="242" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="340" y="100" width="312" height="36" rx="8" fill="#450a0a"/>
  <rect x="340" y="120" width="312" height="16" fill="#450a0a"/>
  <text x="356" y="124" text-anchor="start" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="1.5">ANSWER QUALITY</text>
  <rect x="578" y="107" width="64" height="22" rx="4" fill="#ef4444"/>
  <text x="610" y="123" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">WARN</text>

  <text x="356" y="160" text-anchor="start" fill="#f87171" font-size="13" font-weight="600">2 short answers (&lt; 5 words)</text>
  <text x="356" y="183" text-anchor="start" fill="#f87171" font-size="12">1 empty answer detected</text>

  <line x1="356" y1="200" x2="636" y2="200" stroke="#475569" stroke-width="0.5"/>
  <text x="356" y="220" text-anchor="start" fill="#64748b" font-size="10">Avg answer length: 23 words</text>
  <text x="356" y="238" text-anchor="start" fill="#64748b" font-size="10">Min: 0 words · Max: 142 words</text>

  <rect x="344" y="316" width="304" height="22" rx="4" fill="#450a0a" opacity="0.7"/>
  <text x="496" y="332" text-anchor="middle" fill="#f87171" font-size="10">Review empty/short answers before eval run</text>

  <!-- ── CARD 3: LABEL DISTRIBUTION ── -->
  <rect x="668" y="100" width="320" height="242" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="668" y="100" width="320" height="36" rx="8" fill="#14532d"/>
  <rect x="668" y="120" width="320" height="16" fill="#14532d"/>
  <text x="684" y="124" text-anchor="start" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="1.5">LABEL DISTRIBUTION</text>
  <rect x="904" y="107" width="72" height="22" rx="4" fill="#22c55e"/>
  <text x="940" y="123" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="700">PASS</text>

  <text x="684" y="158" text-anchor="start" fill="#4ade80" font-size="13" font-weight="600">5 categories · balanced</text>

  <text x="684" y="180" text-anchor="start" fill="#94a3b8" font-size="10">reasoning   27%</text>
  <rect x="782" y="170" width="54" height="10" rx="2" fill="#3b82f6" opacity="0.7"/>
  <text x="684" y="196" text-anchor="start" fill="#94a3b8" font-size="10">factual      24%</text>
  <rect x="782" y="186" width="48" height="10" rx="2" fill="#8b5cf6" opacity="0.7"/>
  <text x="684" y="212" text-anchor="start" fill="#94a3b8" font-size="10">calc          21%</text>
  <rect x="782" y="202" width="42" height="10" rx="2" fill="#22c55e" opacity="0.7"/>
  <text x="684" y="228" text-anchor="start" fill="#94a3b8" font-size="10">code          16%</text>
  <rect x="782" y="218" width="32" height="10" rx="2" fill="#f59e0b" opacity="0.7"/>
  <text x="684" y="244" text-anchor="start" fill="#94a3b8" font-size="10">retrieval    12%</text>
  <rect x="782" y="234" width="24" height="10" rx="2" fill="#ef4444" opacity="0.7"/>

  <text x="684" y="267" text-anchor="start" fill="#64748b" font-size="10">No dominant category (&lt; 30% threshold)</text>
  <text x="684" y="282" text-anchor="start" fill="#64748b" font-size="10">Entropy: 2.27 / max 2.32</text>

  <rect x="672" y="316" width="312" height="22" rx="4" fill="#14532d" opacity="0.7"/>
  <text x="828" y="332" text-anchor="middle" fill="#4ade80" font-size="10">Distribution meets diversity requirements</text>

  <!-- ── SUMMARY BOX ── -->
  <rect x="12" y="354" width="976" height="100" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <rect x="12" y="354" width="4" height="100" rx="2" fill="#f59e0b"/>

  <text x="30" y="378" text-anchor="start" fill="#fbbf24" font-size="13" font-weight="700">3 issues flagged · 4 checks PASS · Confidence in benchmark score: MODERATE</text>
  <text x="30" y="400" text-anchor="start" fill="#94a3b8" font-size="11">Recommended actions:  Remove near-duplicates (Q47, Q83, Q112 cluster)  ·  Review empty/short answers before eval run</text>
  <text x="30" y="420" text-anchor="start" fill="#f87171" font-size="11" font-weight="600">Dataset is usable after fixes. Do NOT trust benchmark scores on this dataset as-is.</text>

  <!-- ── FOOTER ── -->
  <rect x="0" y="464" width="1000" height="36" fill="#0f172a"/>
  <line x1="0" y1="464" x2="1000" y2="464" stroke="#475569" stroke-width="0.8"/>
  <text x="500" y="488" text-anchor="middle" fill="#475569" font-size="10">GOLDENSETAUDITOR · Deterministic golden set auditor for LLM/RAG pipelines · No LLM dependency · github.com/SidharthKriplani/goldensetauditor</text>
</svg>
