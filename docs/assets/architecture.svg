<svg viewBox="0 0 1100 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="480" fill="url(#bg)"/>

  <!-- ── SECTION 1: INPUT ── -->
  <rect x="30" y="70" width="200" height="160" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="97" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="2">INPUT</text>
  <line x1="50" y1="106" x2="210" y2="106" stroke="#475569" stroke-width="0.8"/>
  <text x="130" y="130" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">golden_set.jsonl</text>
  <text x="130" y="152" text-anchor="middle" fill="#94a3b8" font-size="10">question</text>
  <text x="130" y="167" text-anchor="middle" fill="#94a3b8" font-size="10">expected_answer</text>
  <text x="130" y="182" text-anchor="middle" fill="#94a3b8" font-size="10">category · source</text>
  <text x="130" y="200" text-anchor="middle" fill="#64748b" font-size="9">+ optional thresholds</text>

  <!-- Arrow INPUT → ENGINE -->
  <line x1="230" y1="150" x2="298" y2="150" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION 2: AUDIT ENGINE ── -->
  <rect x="302" y="30" width="516" height="390" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="560" y="62" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="700">GoldenSetAuditor Engine</text>
  <line x1="322" y1="72" x2="798" y2="72" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
  <text x="560" y="90" text-anchor="middle" fill="#475569" font-size="10">7 deterministic checks · no LLM dependency</text>

  <!-- Check boxes — Row 1 -->
  <rect x="322" y="102" width="228" height="32" rx="4" fill="#0f172a"/>
  <text x="436" y="123" text-anchor="middle" fill="#94a3b8" font-size="11">duplicate_detection</text>
  <rect x="560" y="102" width="248" height="32" rx="4" fill="#0f172a"/>
  <text x="684" y="123" text-anchor="middle" fill="#94a3b8" font-size="11">answer_quality</text>

  <!-- Check boxes — Row 2 -->
  <rect x="322" y="144" width="228" height="32" rx="4" fill="#0f172a"/>
  <text x="436" y="165" text-anchor="middle" fill="#94a3b8" font-size="11">question_ambiguity</text>
  <rect x="560" y="144" width="248" height="32" rx="4" fill="#0f172a"/>
  <text x="684" y="165" text-anchor="middle" fill="#94a3b8" font-size="11">label_distribution</text>

  <!-- Check boxes — Row 3 -->
  <rect x="322" y="186" width="228" height="32" rx="4" fill="#0f172a"/>
  <text x="436" y="207" text-anchor="middle" fill="#94a3b8" font-size="11">question_complexity</text>
  <rect x="560" y="186" width="248" height="32" rx="4" fill="#0f172a"/>
  <text x="684" y="207" text-anchor="middle" fill="#94a3b8" font-size="11">cross_reference_consistency</text>

  <!-- Check boxes — Row 4 centered -->
  <rect x="430" y="228" width="262" height="32" rx="4" fill="#0f172a"/>
  <text x="561" y="249" text-anchor="middle" fill="#94a3b8" font-size="11">metadata_completeness</text>

  <!-- Status pills -->
  <rect x="340" y="282" width="80" height="24" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="299" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">PASS</text>
  <rect x="432" y="282" width="80" height="24" rx="12" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="472" y="299" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">WARN</text>
  <rect x="524" y="282" width="80" height="24" rx="12" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="564" y="299" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700">FAIL</text>
  <text x="700" y="299" text-anchor="middle" fill="#64748b" font-size="10">per check · issue-level evidence</text>

  <!-- Python API label -->
  <rect x="352" y="322" width="420" height="28" rx="6" fill="#0f172a" opacity="0.8"/>
  <text x="562" y="341" text-anchor="middle" fill="#475569" font-size="10">audit(df, config) → AuditReport · src/goldensetauditor/checks.py</text>

  <!-- Engine label bottom -->
  <text x="560" y="398" text-anchor="middle" fill="#3b82f6" font-size="10" opacity="0.5">GoldenSetAuditor v0.1 · PyPI: pip install goldensetauditor</text>

  <!-- Arrows ENGINE → outputs (3 arrows) -->
  <line x1="818" y1="118" x2="876" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="818" y1="218" x2="876" y2="218" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="818" y1="308" x2="876" y2="308" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION 3: OUTPUT ── -->
  <!-- Output node 1: AuditReport -->
  <rect x="878" y="88" width="192" height="72" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="974" y="114" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">AuditReport</text>
  <text x="974" y="133" text-anchor="middle" fill="#86efac" font-size="10">PASS · WARN · FAIL</text>
  <text x="974" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">issue-level evidence</text>

  <!-- Output node 2: Formats -->
  <rect x="878" y="182" width="192" height="72" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="974" y="208" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">JSON · MD · HTML</text>
  <text x="974" y="228" text-anchor="middle" fill="#94a3b8" font-size="10">machine-readable</text>
  <text x="974" y="243" text-anchor="middle" fill="#94a3b8" font-size="10">+ human-readable</text>

  <!-- Output node 3: CLI -->
  <rect x="878" y="276" width="192" height="72" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="974" y="297" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="700">CLI + Python API</text>
  <text x="974" y="316" text-anchor="middle" fill="#94a3b8" font-size="10">python -m goldensetauditor</text>
  <text x="974" y="333" text-anchor="middle" fill="#94a3b8" font-size="10">audit(dataset)</text>

  <!-- ── BOTTOM STATS BAR ── -->
  <rect x="30" y="432" width="1040" height="36" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <line x1="30" y1="432" x2="1070" y2="432" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Stat pills -->
  <rect x="44" y="440" width="136" height="20" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="112" y="455" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">Checks: 7 deterministic</text>

  <rect x="198" y="440" width="116" height="20" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="256" y="455" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">Tests: 13 passing</text>

  <rect x="330" y="440" width="160" height="20" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="410" y="455" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">False Positives: 0 (no LLM)</text>

  <rect x="510" y="440" width="116" height="20" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="568" y="455" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">PRD Status: PASS</text>

  <text x="860" y="455" text-anchor="middle" fill="#475569" font-size="10">github.com/SidharthKriplani/goldensetauditor</text>
</svg>
